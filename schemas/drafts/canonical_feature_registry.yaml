    ml_default_role: target

  - canonical_feature_key: environmental.odp
    legacy_property_name: odp
    aliases_json: '["ODP", "odp"]'
    display_name: Ozone Depletion Potential
    display_name_zh: 臭氧消耗潜势
    category: environmental
    preferred_standard_unit: dimensionless
    value_type: numeric
    is_condition_sensitive: 0
    ml_default_role: target

  - canonical_feature_key: environmental.atmospheric_lifetime
    legacy_property_name: atmospheric_lifetime_yr

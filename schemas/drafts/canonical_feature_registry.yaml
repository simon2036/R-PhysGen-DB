  - canonical_feature_key: quantum.zpe
    legacy_property_name: zpe_eh
    aliases_json: '["ZPE", "zero_point_energy", "zpe_eh"]'
    display_name: Zero-Point Energy
    display_name_zh: 零点能
    category: quantum_vibrational
    preferred_standard_unit: Eh
    value_type: numeric
    is_condition_sensitive: 0
    default_condition_role: gas_phase_298k
    ml_default_role: feature
    notes: Phase-2 long-form quantum scalar; not projected to wide ML tables.

  - canonical_feature_key: quantum.lowest_real_frequency
    legacy_property_name: lowest_real_frequency_cm_inv
    aliases_json: '["lowest_real_frequency", "lowest_frequency_cm_inv"]'
    display_name: Lowest Real Vibrational Frequency
    display_name_zh: 最低实振动频率
    category: quantum_vibrational
    preferred_standard_unit: cm^-1
    value_type: numeric
    is_condition_sensitive: 0
    default_condition_role: gas_phase_298k
    ml_default_role: feature
    notes: Phase-2 Hessian/opt-freq quality scalar; imaginary modes remain in job metadata and vibrational detail tables.

  - canonical_feature_key: quantum.thermal_enthalpy_correction
    legacy_property_name: thermal_enthalpy_correction_eh
    aliases_json: '["thermal_enthalpy_correction", "H(T)-H(0)"]'

    display_name_zh: 热焓校正
    category: quantum_vibrational
    preferred_standard_unit: Eh
    value_type: numeric
    is_condition_sensitive: 0
    default_condition_role: gas_phase_298k
    ml_default_role: feature
    notes: Phase-2 long-form quantum scalar; not a standard enthalpy of formation.

  - canonical_feature_key: quantum.thermal_gibbs_correction
    legacy_property_name: thermal_gibbs_correction_eh
    aliases_json: '["thermal_gibbs_correction", "G(RRHO)"]'
    display_name: Thermal Gibbs Correction
    display_name_zh: 热吉布斯校正
    category: quantum_vibrational
    preferred_standard_unit: Eh
    value_type: numeric
    is_condition_sensitive: 0
    default_condition_role: gas_phase_298k
    ml_default_role: feature
    notes: Phase-2 long-form quantum scalar; not a standard formation free energy.

  - canonical_feature_key: quantum.conformer_count
    legacy_property_name: conformer_count
    aliases_json: '["crest_conformer_count", "conformer_count"]'
    display_name: Conformer Count
    display_name_zh: 构象数量
    category: quantum_conformer
    preferred_standard_unit: count
    value_type: numeric
    is_condition_sensitive: 0
    default_condition_role: gas_phase_298k
    ml_default_role: feature
    notes: Phase-2 CREST/singleton conformer summary; conformer rows remain in detail tables.

  - canonical_feature_key: quantum.conformer_energy_window
    legacy_property_name: conformer_energy_window_kcal_mol
    aliases_json: '["conformer_energy_window", "relative_energy_window"]'
    display_name: Conformer Relative-Energy Window
    display_name_zh: 构象相对能量窗口
    category: quantum_conformer
    preferred_standard_unit: kcal/mol
    value_type: numeric
    is_condition_sensitive: 0
    default_condition_role: gas_phase_298k
    ml_default_role: feature
    notes: Phase-2 conformer ensemble energy spread; conformer-level energies remain in detail tables.

  - canonical_feature_key: synthesis.synthetic_accessibility_score
    legacy_property_name: synthetic_accessibility
    aliases_json: '["SAScore", "synthetic_accessibility"]'
    display_name: Synthetic Accessibility Score
    display_name_zh: 合成可及性评分
    category: synthesis_proxy
    preferred_standard_unit: dimensionless
    value_type: numeric
    is_condition_sensitive: 0
    ml_default_role: feature_or_target

design_rules:
  - All task-readiness rules MUST bind to canonical_feature_key, not raw property_name.
  - legacy_property_name records the current V1/V2 projection name and is used only for backward-compatible joins.
  - aliases_json is informational; validators should resolve aliases through this registry before failing a task.
  - is_condition_sensitive=1 means a new property_observation row SHOULD carry condition_set_id in P0 and MUST carry it by V1.5 exit.
  - New canonical features must be added here before entering normalization_rules, readiness rules, or phase-2 write-back.
  - This file is configuration; pipeline code must read it but must not mutate it during a dataset build.

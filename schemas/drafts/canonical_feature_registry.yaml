    aliases_json: '["liquid_density", "rho_liq"]'
    display_name: Liquid Density
    display_name_zh: 液态密度
    category: thermodynamic
    preferred_standard_unit: kg/m3
    value_type: numeric
    is_condition_sensitive: 1
    default_condition_role: saturation_liquid
    ml_default_role: target

  - canonical_feature_key: thermodynamic.heat_capacity_liquid
    legacy_property_name: heat_capacity_liquid_jmolK
    aliases_json: '["Cp_liquid", "heat_capacity_liquid"]'
    display_name: Liquid Heat Capacity
    display_name_zh: 液态定压热容
    category: thermodynamic
    preferred_standard_unit: J/(mol*K)
    value_type: numeric
    is_condition_sensitive: 1
    default_condition_role: saturation_liquid
    ml_default_role: target

  - canonical_feature_key: transport.liquid_viscosity
    legacy_property_name: viscosity_liquid_pas
    aliases_json: '["viscosity", "liquid_viscosity"]'
    display_name: Liquid Viscosity
    display_name_zh: 液态黏度
    category: transport
    preferred_standard_unit: Pa*s
    value_type: numeric
    is_condition_sensitive: 1
    default_condition_role: saturation_liquid
    ml_default_role: target

  - canonical_feature_key: transport.liquid_thermal_conductivity
    legacy_property_name: thermal_conductivity_liquid_wmk
    aliases_json: '["thermal_conductivity", "liquid_thermal_conductivity"]'
    display_name: Liquid Thermal Conductivity
    display_name_zh: 液态导热系数
    category: transport
    preferred_standard_unit: W/(m*K)
    value_type: numeric
    is_condition_sensitive: 1
    default_condition_role: saturation_liquid
    ml_default_role: target

  - canonical_feature_key: environmental.gwp_20yr
    legacy_property_name: gwp_20yr
    aliases_json: '["GWP20", "gwp_20yr"]'
    display_name: Global Warming Potential 20-yr
    display_name_zh: 全球变暖潜势（20 年）
    category: environmental
    preferred_standard_unit: dimensionless
    value_type: numeric
    is_condition_sensitive: 0

    preferred_standard_unit: degC
    value_type: numeric
    is_condition_sensitive: 1
    default_condition_role: cycle_operating_point
    ml_default_role: target

  - canonical_feature_key: quantum.homo_energy
    legacy_property_name: homo_ev
    aliases_json: '["HOMO", "homo_ev"]'
    display_name: HOMO Energy
    display_name_zh: HOMO 能量
    category: quantum_electronic
    preferred_standard_unit: eV
    value_type: numeric
    is_condition_sensitive: 0

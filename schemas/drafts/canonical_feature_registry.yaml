    display_name_zh: 大气寿命
    category: environmental
    preferred_standard_unit: yr
    value_type: numeric
    is_condition_sensitive: 0
    ml_default_role: target

  - canonical_feature_key: environmental.tfa_risk_proxy
    legacy_property_name: tfa_risk_proxy
    aliases_json: '["tfa_proxy", "tfa_risk"]'
    display_name: TFA Formation Risk Proxy
    display_name_zh: TFA 生成风险代理
    category: degradation_proxy
    preferred_standard_unit: categorical
    value_type: categorical
    is_condition_sensitive: 0
    ml_default_role: target

  - canonical_feature_key: safety.safety_group
    legacy_property_name: ashrae_safety
    aliases_json: '["ashrae_safety", "ashrae_safety_class", "safety_group"]'
    display_name: ASHRAE Safety Group
    display_name_zh: ASHRAE 安全分类
    category: safety
    preferred_standard_unit: categorical
    value_type: categorical
    is_condition_sensitive: 0
    ml_default_role: target

  - canonical_feature_key: safety.toxicity_class
    legacy_property_name: toxicity_class
    aliases_json: '["toxicity_class", "toxicity"]'
    display_name: Toxicity Class
    display_name_zh: 毒性等级
    category: safety
    preferred_standard_unit: categorical
    value_type: categorical
    is_condition_sensitive: 0
    ml_default_role: target

  - canonical_feature_key: safety.lfl

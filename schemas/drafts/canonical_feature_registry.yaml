  - canonical_feature_key: environmental.gwp_100yr
    legacy_property_name: gwp_100yr
    aliases_json: '["GWP100", "gwp_100yr", "gwp_ar4_100yr", "gwp_ar5_100yr", "gwp_ar6_100yr"]'
    display_name: Global Warming Potential 100-yr
    display_name_zh: 全球变暖潜势（100 年）
    category: environmental
    preferred_standard_unit: dimensionless
    value_type: numeric

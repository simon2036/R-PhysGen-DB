table_name: canonical_feature_registry
layer: config
status: p0_draft_ready
path: schemas/canonical_feature_registry.yaml
description: >
  canonical_feature_key 的权威注册表。P0 之后，readiness 规则、condition-sensitive
  校验、normalization_rules、property_observation.canonical_feature_key、以及 governance
  crosswalk 均应引用本表。本表采用 namespaced key，优先兼容 governance bundle 中已经出现的
  canonical_feature_key，避免把 readiness 规则绑定到 legacy property_name。

primary_key:
  - canonical_feature_key

columns:
  - {name: canonical_feature_key, dtype: string, required: true}
  - {name: legacy_property_name, dtype: string, required: false}
  - {name: aliases_json, dtype: string, required: false}
  - {name: display_name, dtype: string, required: true}
  - {name: display_name_zh, dtype: string, required: false}
  - {name: category, dtype: string, required: true}
  - {name: preferred_standard_unit, dtype: string, required: true}
  - {name: value_type, dtype: string, required: true}
  - {name: is_condition_sensitive, dtype: int, required: true}
  - {name: default_condition_role, dtype: string, required: false}
  - {name: ml_default_role, dtype: string, required: false}
  - {name: notes, dtype: string, required: false}

category_vocabulary:
  - molecular_identity
  - molecular_descriptor
  - thermodynamic
  - transport
  - environmental
  - safety
  - quantum_electronic
  - quantum_conformer
  - quantum_vibrational
  - cycle_performance
  - synthesis_proxy
  - degradation_proxy

value_type_vocabulary:
  - numeric
  - categorical
  - boolean
  - text

ml_default_role_vocabulary:
  - feature
  - target
  - feature_or_target
  - metadata
  - excluded

registry:
  - canonical_feature_key: identity.mol_id
    legacy_property_name: mol_id
    aliases_json: '["mol_id"]'
    display_name: Molecule ID
    display_name_zh: 分子 ID
    category: molecular_identity
    preferred_standard_unit: none
    value_type: text
    is_condition_sensitive: 0
    ml_default_role: metadata

  - canonical_feature_key: molecular_descriptor.molecular_weight
    legacy_property_name: molecular_weight
    aliases_json: '["mol_weight", "molecular_weight"]'
    display_name: Molecular Weight
    display_name_zh: 分子量
    category: molecular_descriptor
    preferred_standard_unit: g/mol
    value_type: numeric
    is_condition_sensitive: 0
    ml_default_role: feature

  - canonical_feature_key: molecular_descriptor.acentric_factor
    legacy_property_name: acentric_factor
    aliases_json: '["omega", "acentric_factor"]'
    display_name: Acentric Factor
    display_name_zh: 偏心因子
    category: molecular_descriptor
    preferred_standard_unit: dimensionless
    value_type: numeric
    is_condition_sensitive: 0
    ml_default_role: feature_or_target

  - canonical_feature_key: thermodynamic.normal_boiling_temperature
    legacy_property_name: boiling_point_c
    aliases_json: '["boiling_point", "normal_boiling_point", "Tb", "boiling_point_c"]'
    display_name: Normal Boiling Temperature
    display_name_zh: 标准沸点
    category: thermodynamic
    preferred_standard_unit: degC
    value_type: numeric
    is_condition_sensitive: 0
    default_condition_role: normal_boiling_point
    ml_default_role: target

  - canonical_feature_key: thermodynamic.critical_temperature
    legacy_property_name: critical_temp_c
    aliases_json: '["critical_temperature", "Tc", "critical_temp_c"]'
    display_name: Critical Temperature
    display_name_zh: 临界温度
    category: thermodynamic
    preferred_standard_unit: degC
    value_type: numeric
    is_condition_sensitive: 0
    default_condition_role: critical_point
    ml_default_role: target

  - canonical_feature_key: thermodynamic.critical_pressure
    legacy_property_name: critical_pressure_mpa
    aliases_json: '["critical_pressure", "Pc", "critical_pressure_mpa"]'
    display_name: Critical Pressure
    display_name_zh: 临界压力
    category: thermodynamic
    preferred_standard_unit: MPa
    value_type: numeric
    is_condition_sensitive: 0
    default_condition_role: critical_point
    ml_default_role: target

  - canonical_feature_key: thermodynamic.critical_density
    legacy_property_name: critical_density_kgm3
    aliases_json: '["critical_density", "rhoc", "critical_density_kgm3"]'
    display_name: Critical Density
    display_name_zh: 临界密度
    category: thermodynamic
    preferred_standard_unit: kg/m3
    value_type: numeric
    is_condition_sensitive: 0
    default_condition_role: critical_point
    ml_default_role: feature_or_target

  - canonical_feature_key: thermodynamic.critical_compressibility_factor
    legacy_property_name: critical_compressibility_factor
    aliases_json: '["Zc", "critical_compressibility_factor"]'
    display_name: Critical Compressibility Factor
    display_name_zh: 临界压缩因子
    category: thermodynamic
    preferred_standard_unit: dimensionless
    value_type: numeric
    is_condition_sensitive: 0
    default_condition_role: critical_point
    ml_default_role: feature

  - canonical_feature_key: thermodynamic.vaporization_enthalpy
    legacy_property_name: vaporization_enthalpy_kjmol
    aliases_json: '["enthalpy_vaporization", "delta_h_vap", "vaporization_enthalpy_kjmol"]'
    display_name: Enthalpy of Vaporization
    display_name_zh: 汽化焓
    category: thermodynamic
    preferred_standard_unit: kJ/mol
    value_type: numeric
    is_condition_sensitive: 1
    default_condition_role: normal_boiling_point
    ml_default_role: target

  - canonical_feature_key: thermodynamic.vapor_pressure
    legacy_property_name: vapor_pressure_kpa
    aliases_json: '["vapor_pressure", "psat", "vapor_pressure_kpa"]'
    display_name: Vapor Pressure
    display_name_zh: 饱和蒸气压
    category: thermodynamic
    preferred_standard_unit: kPa
    value_type: numeric
    is_condition_sensitive: 1
    default_condition_role: saturation_vapor
    ml_default_role: target

  - canonical_feature_key: thermodynamic.liquid_density

    legacy_property_name: lumo_ev
    aliases_json: '["LUMO", "lumo_ev"]'
    display_name: LUMO Energy
    display_name_zh: LUMO 能量
    category: quantum_electronic
    preferred_standard_unit: eV
    value_type: numeric
    is_condition_sensitive: 0
    default_condition_role: gas_phase_298k
    ml_default_role: feature

  - canonical_feature_key: quantum.homo_lumo_gap
    legacy_property_name: gap_ev
    aliases_json: '["HOMO_LUMO_gap", "gap_ev"]'
    display_name: HOMO-LUMO Gap
    display_name_zh: HOMO-LUMO 间隙
    category: quantum_electronic
    preferred_standard_unit: eV
    value_type: numeric
    is_condition_sensitive: 0
    default_condition_role: gas_phase_298k
    ml_default_role: feature

  - canonical_feature_key: quantum.total_energy
    legacy_property_name: total_energy_eh
    aliases_json: '["total_energy", "total_energy_eh", "xtb_total_energy"]'
    display_name: Total Electronic Energy
    display_name_zh: 总电子能量
    category: quantum_electronic
    preferred_standard_unit: Eh
    value_type: numeric
    is_condition_sensitive: 0
    default_condition_role: gas_phase_298k
    ml_default_role: feature

  - canonical_feature_key: quantum.dipole_moment
    legacy_property_name: dipole_moment_debye
    aliases_json: '["dipole_moment", "dipole_moment_debye", "molecular_dipole"]'
    display_name: Dipole Moment
    display_name_zh: 偶极矩
    category: quantum_electronic
    preferred_standard_unit: Debye
    value_type: numeric
    is_condition_sensitive: 0
    default_condition_role: gas_phase_298k

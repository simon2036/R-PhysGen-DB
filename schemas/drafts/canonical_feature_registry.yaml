  - canonical_feature_key: cycle.cop
    legacy_property_name: cop_standard_cycle
    aliases_json: '["cop", "cop_standard_cycle"]'
    display_name: Coefficient of Performance
    display_name_zh: 性能系数
    category: cycle_performance
    preferred_standard_unit: dimensionless
    value_type: numeric
    is_condition_sensitive: 1
    default_condition_role: cycle_operating_point

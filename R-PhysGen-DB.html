<!doctype html>
<html lang="zh-Hans">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>R-PhysGen-DB · Refrigerant property database</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet"/>
<style>
:root {
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'IBM Plex Mono', 'SFMono-Regular', Menlo, monospace;
  --font-serif: 'Source Serif 4', 'Iowan Old Style', Georgia, serif;

  /* Light theme — warm neutral */
  --bg:          oklch(98.5% 0.005 80);
  --bg-raised:  oklch(100% 0 0);
  --bg-sunken:  oklch(96.5% 0.007 80);
  --bg-panel:   oklch(98% 0.005 80);
  --border:     oklch(91% 0.008 80);
  --border-strong: oklch(83% 0.01 80);
  --ink:        oklch(21% 0.012 240);
  --ink-muted:  oklch(46% 0.013 240);
  --ink-subtle: oklch(62% 0.011 240);
  --accent:     oklch(52% 0.12 210);
  --accent-soft:oklch(95.5% 0.028 210);
  --accent-ink: oklch(40% 0.12 210);
  --good:       oklch(55% 0.11 145);
  --good-soft:  oklch(95% 0.03 145);
  --warn:       oklch(62% 0.13 65);
  --warn-soft:  oklch(96% 0.04 65);
  --danger:     oklch(55% 0.17 25);
  --danger-soft:oklch(95% 0.04 25);
  --focus:      oklch(60% 0.18 250);
  --shadow-sm:  0 1px 2px oklch(20% 0.02 240 / 0.05);
  --shadow-md:  0 2px 6px oklch(20% 0.02 240 / 0.05), 0 8px 24px oklch(20% 0.02 240 / 0.06);
  --shadow-lg:  0 14px 44px oklch(20% 0.02 240 / 0.12), 0 4px 10px oklch(20% 0.02 240 / 0.06);
  --radius-sm:  5px;
  --radius:     8px;
  --radius-lg:  12px;
  color-scheme: light;
}

:root[data-theme="dark"] {
  --bg:         oklch(17% 0.008 250);
  --bg-raised:  oklch(21% 0.01 250);
  --bg-sunken:  oklch(14% 0.008 250);
  --bg-panel:   oklch(20% 0.009 250);
  --border:     oklch(28% 0.012 250);
  --border-strong: oklch(36% 0.015 250);
  --ink:        oklch(94% 0.005 250);
  --ink-muted:  oklch(72% 0.01 250);
  --ink-subtle: oklch(55% 0.01 250);
  --accent:     oklch(72% 0.12 205);
  --accent-soft:oklch(28% 0.05 205);
  --accent-ink: oklch(82% 0.1 205);
  --good:       oklch(72% 0.14 145);
  --good-soft:  oklch(26% 0.05 145);
  --warn:       oklch(78% 0.14 75);
  --warn-soft:  oklch(28% 0.06 75);
  --danger:     oklch(70% 0.17 25);
  --danger-soft:oklch(28% 0.07 25);
  --focus:      oklch(75% 0.15 250);
  --shadow-sm:  0 1px 2px oklch(0% 0 0 / 0.3);
  --shadow-md:  0 4px 16px oklch(0% 0 0 / 0.4), 0 1px 2px oklch(0% 0 0 / 0.3);
  --shadow-lg:  0 12px 40px oklch(0% 0 0 / 0.5);
  color-scheme: dark;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "ss01", "cv11", "cv05";
}
button { font-family: inherit; color: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; color: inherit; }
a { color: var(--accent-ink); text-decoration: none; }
a:hover { text-decoration: underline; }
code, .mono { font-family: var(--font-mono); font-feature-settings: "zero"; }

/* ------------------------------------------------------------- APP SHELL */
.app {
  display: grid;
  grid-template-columns: 244px 1fr;
  min-height: 100vh;
}
.sidebar {
  border-right: 1px solid var(--border);
  background: var(--bg-panel);
  padding: 18px 14px;
  position: sticky; top: 0; height: 100vh;
  display: flex; flex-direction: column; gap: 2px;
  overflow-y: auto;
}
.brand {
  display: flex; align-items: center; gap: 10px;
  padding: 4px 6px 18px 6px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 14px;
}
.brand-mark {
  width: 30px; height: 30px; border-radius: 7px;
  background: linear-gradient(145deg, var(--ink), oklch(35% 0.015 240));
  color: var(--bg-raised);
  display: grid; place-items: center;
  font-family: var(--font-serif); font-weight: 600;
  font-size: 16px; letter-spacing: -0.02em;
  box-shadow: inset 0 1px 0 oklch(100% 0 0 / 0.08), 0 1px 2px oklch(0% 0 0 / 0.18);
}
.brand-name {
  font-family: var(--font-serif);
  font-size: 15px; font-weight: 600; letter-spacing: -0.01em;
  line-height: 1.1;
}
.brand-sub {
  font-size: 11px; color: var(--ink-subtle);
  font-family: var(--font-mono);
  letter-spacing: 0;
}
.nav-section { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--ink-subtle); padding: 16px 10px 6px; font-weight: 600; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 10px; border-radius: 6px;
  color: var(--ink-muted);
  cursor: pointer;
  font-size: 13px;
  border: 1px solid transparent;
  user-select: none;
  position: relative;
  transition: background 100ms ease, color 100ms ease;
}
.nav-item:hover { background: var(--bg-sunken); color: var(--ink); }
.nav-item.active {
  background: var(--accent-soft); color: var(--accent-ink); font-weight: 500;
}
.nav-item.active::before {
  content: ""; position: absolute; left: -14px; top: 6px; bottom: 6px;
  width: 2px; background: var(--accent); border-radius: 0 2px 2px 0;
}
.nav-item .nav-badge {
  margin-left: auto; font-family: var(--font-mono); font-size: 11px;
  color: var(--ink-subtle); font-weight: 400;
}
.nav-item.active .nav-badge { color: var(--accent-ink); opacity: 0.7; }
.nav-icon { width: 14px; height: 14px; opacity: 0.7; flex-shrink: 0; }
.nav-item.active .nav-icon { opacity: 1; }

.sidebar-foot {
  margin-top: auto; padding-top: 16px;
  border-top: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 8px;
}
.top-controls {
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
.theme-toggle, .language-toggle {
  display: flex; align-items: center; background: var(--bg-sunken);
  border: 1px solid var(--border); border-radius: 999px; padding: 2px; gap: 0;
  flex-shrink: 0;
}
.theme-toggle button, .language-toggle button {
  flex: 1; padding: 5px 10px; border: 0; background: transparent;
  border-radius: 999px; font-size: 12px; color: var(--ink-muted);
  display: flex; align-items: center; justify-content: center; gap: 6px;
  white-space: nowrap;
}
.theme-toggle button.active, .language-toggle button.active { background: var(--bg-raised); color: var(--ink); box-shadow: var(--shadow-sm); }

.version-line {
  font-family: var(--font-mono); font-size: 11px; color: var(--ink-subtle);
  padding: 0 6px; line-height: 1.4;
}

/* ------------------------------------------------------------- MAIN */
.main {
  display: flex; flex-direction: column; min-width: 0;
}
.topbar {
  height: 58px; border-bottom: 1px solid var(--border);
  background: color-mix(in oklab, var(--bg) 92%, transparent);
  backdrop-filter: saturate(140%) blur(8px);
  -webkit-backdrop-filter: saturate(140%) blur(8px);
  display: flex; align-items: center; gap: 16px;
  padding: 0 32px;
  position: sticky; top: 0; z-index: 10;
}
.search {
  flex: 1; max-width: 640px;
  display: flex; align-items: center; gap: 10px;
  background: var(--bg-sunken); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 7px 12px;
  transition: border-color 140ms, background 140ms, box-shadow 140ms;
}
.search:focus-within {
  border-color: var(--accent); background: var(--bg-raised);
  box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 16%, transparent);
}
.search input { flex: 1; background: transparent; border: 0; outline: 0; font-size: 13.5px; }
.search .kbd { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-subtle);
  border: 1px solid var(--border); padding: 2px 6px; border-radius: 4px; background: var(--bg-raised);
  letter-spacing: 0.04em; }
.topbar-right { display: flex; align-items: center; gap: 12px; margin-left: auto;
  color: var(--ink-muted); font-size: 12px; }
.theme-corner { display: none; }
.status-dot { width: 6px; height: 6px; background: var(--good); border-radius: 50%;
  box-shadow: 0 0 0 3px color-mix(in oklab, var(--good) 25%, transparent); }

.page {
  padding: 32px 44px 72px;
  max-width: 1480px;
  width: 100%;
}
.page-head { margin-bottom: 28px; }
.page-eyebrow {
  font-family: var(--font-mono); font-size: 11px; color: var(--ink-subtle);
  letter-spacing: 0.04em; margin-bottom: 6px; text-transform: uppercase;
}
.page-title {
  font-family: var(--font-serif); font-size: 30px; font-weight: 600;
  letter-spacing: -0.02em; margin: 0 0 6px; color: var(--ink);
  line-height: 1.15;
}
.page-sub { color: var(--ink-muted); max-width: 72ch; font-size: 14px; line-height: 1.6; }

/* ------------------------------------------------------------- CARDS */
.card {
  background: var(--bg-raised); border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
}
.card-head {
  padding: 14px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}
.card-title { font-size: 13px; font-weight: 600; letter-spacing: -0.005em; }
.card-sub  { font-size: 11.5px; color: var(--ink-subtle); margin-left: auto; font-family: var(--font-mono); }
.card-body { padding: 20px; }
.card-body.flush { padding: 0; }

/* ------------------------------------------------------------- STATS */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; }
.stat {
  background: var(--bg-raised); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 18px 18px 16px;
  display: flex; flex-direction: column; gap: 6px;
  position: relative; overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: border-color 140ms, transform 140ms;
}
.stat::after {
  content: ""; position: absolute; inset: 0 0 auto 0; height: 1px;
  background: linear-gradient(90deg, transparent, color-mix(in oklab, var(--border) 80%, transparent), transparent);
}
.stat-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.07em;
  color: var(--ink-subtle); font-weight: 600; }
.stat-value { font-family: var(--font-serif); font-size: 30px; font-weight: 500;
  color: var(--ink); letter-spacing: -0.02em; font-feature-settings: "zero", "tnum";
  font-variant-numeric: tabular-nums; line-height: 1.1; margin-top: 2px; }
.stat-foot { font-size: 12px; color: var(--ink-muted); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 2px; }
.stat-foot .mono { font-size: 11px; }
.stat-accent { border-left: 3px solid var(--accent); }

/* ------------------------------------------------------------- PILLS / BADGES */
.pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 2px 8px; border-radius: 999px;
  font-size: 11px; font-weight: 500;
  background: var(--bg-sunken); color: var(--ink-muted);
  border: 1px solid var(--border);
  font-family: var(--font-mono); letter-spacing: 0.01em;
  line-height: 1.5;
}
.pill.accent { background: var(--accent-soft); color: var(--accent-ink); border-color: transparent; }
.pill.good   { background: var(--good-soft);   color: var(--good);   border-color: transparent; }
.pill.warn   { background: var(--warn-soft);   color: oklch(42% 0.12 65); border-color: transparent; }
:root[data-theme="dark"] .pill.warn { color: var(--warn); }
.pill.danger { background: var(--danger-soft); color: var(--danger); border-color: transparent; }
.pill.ghost  { background: transparent; }
.pill-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

.tier-a { background: oklch(95% 0.04 155); color: oklch(40% 0.11 150); }
.tier-b { background: oklch(95% 0.03 205); color: oklch(40% 0.11 205); }
.tier-c { background: oklch(95% 0.04 75);  color: oklch(42% 0.11 65); }
.tier-d { background: var(--bg-sunken);    color: var(--ink-subtle); border: 1px solid var(--border); }
:root[data-theme="dark"] .tier-a { background: oklch(30% 0.06 150); color: oklch(82% 0.1 150); }
:root[data-theme="dark"] .tier-b { background: oklch(28% 0.05 205); color: oklch(82% 0.1 205); }
:root[data-theme="dark"] .tier-c { background: oklch(30% 0.06 75);  color: oklch(82% 0.12 75); }

/* Safety class pills */
.sc { font-family: var(--font-mono); font-weight: 600; font-size: 11px; padding: 2px 7px; border-radius: 4px; }
.sc-A1 { background: oklch(95% 0.03 150); color: oklch(42% 0.11 150); }
.sc-A2L, .sc-A2 { background: oklch(96% 0.03 105); color: oklch(45% 0.12 110); }
.sc-A3 { background: oklch(96% 0.05 55); color: oklch(45% 0.14 50); }
.sc-B1 { background: oklch(94% 0.03 255); color: oklch(42% 0.1 255); }
.sc-B2L, .sc-B2 { background: oklch(94% 0.04 315); color: oklch(45% 0.13 315); }
.sc-B3 { background: oklch(94% 0.05 10); color: oklch(45% 0.16 20); }
:root[data-theme="dark"] .sc-A1 { background: oklch(28% 0.05 150); color: oklch(82% 0.1 150); }
:root[data-theme="dark"] .sc-A2L, :root[data-theme="dark"] .sc-A2 { background: oklch(28% 0.05 110); color: oklch(85% 0.12 110); }
:root[data-theme="dark"] .sc-A3 { background: oklch(30% 0.06 50); color: oklch(82% 0.14 50); }
:root[data-theme="dark"] .sc-B1 { background: oklch(28% 0.05 255); color: oklch(82% 0.1 255); }
:root[data-theme="dark"] .sc-B2L, :root[data-theme="dark"] .sc-B2 { background: oklch(28% 0.05 315); color: oklch(82% 0.13 315); }
:root[data-theme="dark"] .sc-B3 { background: oklch(30% 0.06 20); color: oklch(82% 0.16 20); }

/* ------------------------------------------------------------- TABLE */
.data-table {
  width: 100%; border-collapse: collapse;
  font-size: 13px;
}
.data-table thead th {
  text-align: left; font-weight: 600; font-size: 10.5px;
  text-transform: uppercase; letter-spacing: 0.07em;
  color: var(--ink-subtle);
  padding: 11px 14px; border-bottom: 1px solid var(--border);
  background: var(--bg-panel);
  white-space: nowrap;
  position: sticky; top: 0;
}
.data-table thead th:first-child { padding-left: 18px; }
.data-table thead th:last-child  { padding-right: 18px; }
.data-table tbody td {
  padding: 11px 14px; border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.data-table tbody td:first-child { padding-left: 18px; }
.data-table tbody td:last-child  { padding-right: 18px; }
.data-table tbody tr { transition: background 80ms; }
.data-table tbody tr:hover { background: var(--bg-sunken); cursor: pointer; }
.data-table tbody tr.selected { background: var(--accent-soft); }
.data-table tbody tr:last-child td { border-bottom: 0; }
.col-num { font-family: var(--font-mono); text-align: right;
  font-feature-settings: "zero", "tnum"; font-variant-numeric: tabular-nums; }
.col-id  { font-family: var(--font-mono); color: var(--ink-muted); font-size: 12px; }
.col-name { font-weight: 500; }

/* ------------------------------------------------------------- BUTTONS */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--bg-raised);
  color: var(--ink); font-size: 13px; font-weight: 500;
  transition: background 120ms, border-color 120ms, transform 80ms, box-shadow 120ms;
  box-shadow: var(--shadow-sm);
}
.btn:hover { background: var(--bg-sunken); border-color: var(--border-strong); }
.btn:active { transform: translateY(0.5px); }
.btn.primary {
  background: linear-gradient(180deg, oklch(from var(--accent) calc(l + 3%) c h), var(--accent));
  border-color: color-mix(in oklab, var(--accent) 80%, black);
  color: oklch(98% 0.01 205);
  box-shadow: inset 0 1px 0 oklch(100% 0 0 / 0.14), 0 1px 2px oklch(30% 0.05 210 / 0.2);
}
:root[data-theme="dark"] .btn.primary { color: oklch(18% 0.01 250); }
.btn.primary:hover { background: oklch(from var(--accent) calc(l - 3%) c h); }
.btn.ghost { background: transparent; border-color: transparent; color: var(--ink-muted); box-shadow: none; }
.btn.ghost:hover { background: var(--bg-sunken); color: var(--ink); }
.btn.sm { padding: 4px 10px; font-size: 12px; }

/* ------------------------------------------------------------- FILTERS */
.filterbar {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  padding: 14px 18px; border-bottom: 1px solid var(--border);
  background: var(--bg-panel);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
}
.filter-label { font-size: 11px; color: var(--ink-subtle); margin-right: 4px;
  text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
.chip-group { display: inline-flex; gap: 0; border: 1px solid var(--border);
  background: var(--bg-raised); border-radius: var(--radius); padding: 2px; }
.chip {
  padding: 4px 11px; font-size: 12px; color: var(--ink-muted);
  border-radius: 5px; border: 0; background: transparent;
  transition: background 120ms, color 120ms;
}
.chip:hover { color: var(--ink); }
.chip.active { background: var(--bg-sunken); color: var(--ink); font-weight: 500; box-shadow: var(--shadow-sm); }
.select {
  background: var(--bg-raised); border: 1px solid var(--border);
  padding: 5px 10px; border-radius: var(--radius); font-size: 12.5px;
  color: var(--ink); height: 30px; padding-right: 28px;
  appearance: none; -webkit-appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M2 4l3 3 3-3' fill='none' stroke='currentColor' stroke-width='1.3' stroke-linecap='round' stroke-linejoin='round'/></svg>");
  background-repeat: no-repeat; background-position: right 8px center;
  transition: border-color 120ms, box-shadow 120ms;
}
.select:focus { border-color: var(--accent); outline: 0; box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 16%, transparent); }

/* ------------------------------------------------------------- DETAIL */
.detail-grid {
  display: grid; grid-template-columns: 1fr 360px; gap: 22px;
  align-items: flex-start;
}
@media (max-width: 1180px) { .detail-grid { grid-template-columns: 1fr; } }
.kv-list { display: grid; grid-template-columns: auto 1fr; gap: 8px 20px; font-size: 13px; }
.kv-list dt { color: var(--ink-subtle); font-size: 12px; }
.kv-list dd { margin: 0; font-family: var(--font-mono); font-feature-settings: "zero", "tnum"; }

.hero-panel {
  display: grid; grid-template-columns: 260px minmax(0, 1fr) 180px; gap: 24px;
  align-items: flex-start;
  padding: 26px 28px;
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin-bottom: 22px;
  position: relative;
  box-shadow: var(--shadow-sm);
}
.struct-box {
  width: 100%; height: 200px;
  background: var(--bg-sunken); border: 1px solid var(--border);
  border-radius: var(--radius);
  position: relative; overflow: hidden;
  display: grid; place-items: center;
}
.struct-box .placeholder-label {
  position: absolute; top: 8px; left: 10px;
  font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-subtle);
  letter-spacing: 0.03em;
  z-index: 2;
}
.struct-stripes {
  position: absolute; inset: 0;
  background-image: repeating-linear-gradient(
    -45deg,
    transparent 0 10px,
    color-mix(in oklab, var(--border) 50%, transparent) 10px 11px
  );
}
.struct-formula {
  font-family: var(--font-serif); font-size: 34px; font-weight: 500;
  color: var(--ink); position: relative; letter-spacing: -0.01em;
}
.struct-formula sub { font-size: 0.62em; font-weight: 400; }
.struct-mol-svg {
  position: relative;
  width: 100%; height: 100%;
  padding: 24px 18px 12px;
  display: grid; place-items: center;
  color: var(--ink);
}
.struct-mol-svg svg {
  width: 100%; height: 100%;
  max-width: 230px; max-height: 170px;
}
.structure-toggle {
  position: absolute; top: 7px; right: 8px; z-index: 3;
  display: inline-flex; gap: 0; padding: 2px;
  border: 1px solid var(--border);
  border-radius: 999px;
  background: color-mix(in oklab, var(--bg-raised) 92%, transparent);
  box-shadow: var(--shadow-sm);
}
.structure-toggle button {
  border: 0; background: transparent; color: var(--ink-subtle);
  border-radius: 999px; padding: 3px 8px;
  font-family: var(--font-mono); font-size: 10.5px; line-height: 1.2;
}
.structure-toggle button.active {
  background: var(--accent-soft); color: var(--accent-ink); font-weight: 600;
}
.structure-toggle button:disabled { opacity: 0.45; cursor: not-allowed; }
.structure-3d {
  position: relative; width: 100%; height: 100%;
  padding: 24px 12px 12px;
}
.structure-3d svg {
  width: 100%; height: 100%;
  touch-action: none; cursor: grab;
}
.structure-3d svg:active { cursor: grabbing; }
.structure-reset {
  position: absolute; right: 8px; bottom: 8px;
  border: 1px solid var(--border); border-radius: 999px;
  background: color-mix(in oklab, var(--bg-raised) 92%, transparent);
  color: var(--ink-subtle); padding: 3px 8px;
  font-family: var(--font-mono); font-size: 10px;
  box-shadow: var(--shadow-sm);
}
.structure-reset:hover { color: var(--ink); border-color: var(--border-strong); }
.structure-empty {
  position: relative; z-index: 1; color: var(--ink-subtle);
  font-family: var(--font-mono); font-size: 11px;
}
.structure-thumb {
  width: 74px; height: 52px;
  display: grid; place-items: center;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-sunken);
  overflow: hidden;
}
.structure-thumb .struct-mol-svg {
  padding: 3px;
}
.structure-thumb .struct-mol-svg svg {
  max-width: 68px; max-height: 46px;
}
.structure-thumb .struct-formula { font-size: 15px; }

.property-card {
  background: var(--bg-raised); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 14px 16px;
  display: flex; flex-direction: column; gap: 6px;
  transition: border-color 120ms, box-shadow 120ms;
}
.property-card:hover { border-color: var(--border-strong); box-shadow: var(--shadow-sm); }
.property-card .prop-name { font-size: 12px; color: var(--ink-subtle);
  display: flex; justify-content: space-between; align-items: center; }
.property-card .prop-value {
  font-family: var(--font-mono); font-size: 19px; font-weight: 500;
  font-feature-settings: "zero", "tnum"; font-variant-numeric: tabular-nums;
  color: var(--ink);
}
.property-card .prop-unit {
  font-size: 12px; color: var(--ink-subtle); font-family: var(--font-mono);
  margin-left: 4px;
}
.property-card .prop-src {
  font-size: 11px; color: var(--ink-subtle); display: flex; gap: 6px; align-items: center;
  margin-top: 2px; font-family: var(--font-mono);
}
.property-card.strict { border-left: 3px solid var(--good); }
.property-card.conflict { border-left: 3px solid var(--warn); }
.property-card.proxy { border-left: 3px solid var(--ink-subtle); border-style: solid solid solid dashed; }
.property-card:empty-dummy { opacity: 0.4; }

.quality-bar { height: 3px; background: var(--bg-sunken); border-radius: 2px; overflow: hidden; }
.quality-bar > div { height: 100%; background: var(--good); }

/* sparkline box */
.spark { height: 60px; display: flex; align-items: flex-end; gap: 3px; padding: 6px 0; }
.spark .bar { flex: 1; background: linear-gradient(180deg, var(--accent), color-mix(in oklab, var(--accent) 60%, transparent));
  opacity: 0.85; min-height: 2px; border-radius: 3px 3px 0 0;
  transition: opacity 120ms;
}
.spark .bar:hover { opacity: 1; }

/* breadcrumbs */
.crumbs { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink-subtle);
  margin-bottom: 16px; font-family: var(--font-mono); }
.crumbs a { color: var(--ink-subtle); }
.crumbs a:hover { color: var(--ink); }
.crumbs .sep { opacity: 0.5; }

/* tabs */
.tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.tab {
  padding: 10px 14px; border: 0; background: transparent;
  font-size: 13px; color: var(--ink-muted); border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color 120ms, border-color 120ms;
}
.tab.active { color: var(--ink); border-bottom-color: var(--accent); font-weight: 500; }
.tab:hover { color: var(--ink); }

/* layout grids */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
@media (max-width: 900px) { .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; } }

.section-title { font-size: 12px; font-weight: 600; color: var(--ink-subtle);
  margin: 32px 0 14px; display: flex; align-items: center; gap: 14px;
  text-transform: uppercase; letter-spacing: 0.08em; }
.section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }

/* Expandable provenance row */
.prov-detail { background: var(--bg-sunken); padding: 16px 20px; font-size: 12.5px;
  border-bottom: 1px solid var(--border); }
.prov-detail .kv-list dd { font-size: 12px; }

/* empty state */
.empty {
  padding: 60px 20px; text-align: center; color: var(--ink-subtle);
}
.empty .icon { font-size: 28px; margin-bottom: 8px; opacity: 0.4; }

/* small utility */
.row { display: flex; align-items: center; gap: 8px; }
.muted { color: var(--ink-muted); }
.subtle { color: var(--ink-subtle); }
.strong { font-weight: 600; color: var(--ink); }
.right { margin-left: auto; }
.divider { height: 1px; background: var(--border); margin: 20px 0; }
.scroll-x { overflow-x: auto; }

/* coverage ring */
.ring { --p: 50; --size: 52px; --t: 5px;
  width: var(--size); height: var(--size); border-radius: 50%;
  background:
    conic-gradient(var(--accent) calc(var(--p) * 1%), var(--bg-sunken) 0);
  display: grid; place-items: center;
}
.ring::before {
  content: ""; width: calc(var(--size) - var(--t)*2);
  height: calc(var(--size) - var(--t)*2);
  background: var(--bg-raised); border-radius: 50%;
  grid-area: 1/1;
}
.ring-label {
  grid-area: 1/1; font-family: var(--font-mono); font-size: 12px;
  font-weight: 500; color: var(--ink); z-index: 1;
}

/* stacked-bar coverage */
.stack-bar { display: flex; height: 10px; border-radius: 4px; overflow: hidden; border: 1px solid var(--border); background: var(--bg-sunken); }
.stack-bar > div { height: 100%; }
.legend { display: flex; gap: 14px; font-size: 11.5px; color: var(--ink-muted); margin-top: 8px; flex-wrap: wrap; }
.legend .sw { width: 10px; height: 10px; border-radius: 2px; display: inline-block; margin-right: 6px; vertical-align: -1px; }

/* focus */
:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; border-radius: 4px; }

/* scrollbar */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 10px;
  border: 2px solid var(--bg); }
::-webkit-scrollbar-thumb:hover { background: var(--ink-subtle); }

/* ------------------------------------------------------------- HERO (public landing) */
.landing-hero {
  position: relative;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  background:
    radial-gradient(900px 300px at 95% -20%, color-mix(in oklab, var(--accent) 16%, transparent), transparent 60%),
    radial-gradient(600px 240px at 0% 110%, color-mix(in oklab, var(--accent) 7%, transparent), transparent 55%),
    linear-gradient(180deg, var(--bg-raised), var(--bg-panel));
  padding: 44px 48px 36px;
  overflow: hidden;
  margin-bottom: 22px;
  box-shadow: var(--shadow-sm);
  display: flex; flex-direction: column;
}
.landing-hero::after {
  content: "";
  position: absolute; inset: 0;
  background-image:
    linear-gradient(transparent 0 23px, color-mix(in oklab, var(--border) 55%, transparent) 23px 24px),
    linear-gradient(90deg, transparent 0 23px, color-mix(in oklab, var(--border) 55%, transparent) 23px 24px);
  background-size: 24px 24px;
  opacity: 0.32;
  mask-image: radial-gradient(520px 260px at 95% 8%, black, transparent 78%);
  pointer-events: none;
}
.landing-hero > * { position: relative; z-index: 1; }
.landing-eyebrow {
  font-family: var(--font-mono); font-size: 11px; color: var(--accent-ink);
  text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 14px;
  display: inline-flex; align-items: center; gap: 10px;
}
.landing-eyebrow::before {
  content: ""; width: 22px; height: 1px; background: currentColor; opacity: 0.55;
}
.landing-title {
  font-family: var(--font-serif); font-size: 46px; font-weight: 600;
  letter-spacing: -0.028em; line-height: 1.08; margin: 0 0 14px; color: var(--ink);
  max-width: 22ch;
  text-wrap: balance;
}
.landing-sub {
  font-size: 15px; color: var(--ink-muted); max-width: 64ch; line-height: 1.6;
  margin: 0;
  text-wrap: pretty;
}
.landing-search {
  margin-top: 24px; max-width: 640px;
  display: flex; align-items: center; gap: 10px;
  background: var(--bg-raised); border: 1px solid var(--border-strong);
  border-radius: var(--radius); padding: 10px 10px 10px 14px;
  box-shadow: var(--shadow-sm);
  transition: border-color 140ms, box-shadow 140ms;
}
.landing-search:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 18%, transparent); }
.landing-search input { flex: 1; border: 0; outline: 0; background: transparent; font-size: 14.5px; }
.landing-actions { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.landing-meta {
  margin-top: 26px; padding-top: 20px;
  border-top: 1px dashed var(--border);
  display: flex; flex-wrap: wrap; gap: 24px 40px;
  font-size: 12.5px; color: var(--ink-muted);
}
.landing-meta > div { display: flex; flex-direction: column; gap: 4px; }
.landing-meta .num { font-family: var(--font-mono); font-size: 17px; color: var(--ink); font-weight: 500; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
.landing-meta .lbl { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-subtle); font-weight: 600; }

/* compare drawer */
.compare-drawer {
  position: fixed; left: 244px; right: 0; bottom: 0;
  background: color-mix(in oklab, var(--bg-raised) 94%, transparent);
  backdrop-filter: saturate(140%) blur(10px);
  -webkit-backdrop-filter: saturate(140%) blur(10px);
  border-top: 1px solid var(--border-strong);
  padding: 12px 32px; z-index: 40;
  display: flex; align-items: center; gap: 12px;
  box-shadow: var(--shadow-lg);
}
@media (max-width: 900px) { .compare-drawer { left: 0; padding: 10px 16px; } }
.compare-chip {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--bg-sunken); border: 1px solid var(--border);
  padding: 3px 4px 3px 10px; border-radius: 999px; font-size: 12.5px;
  transition: border-color 120ms;
}
.compare-chip:hover { border-color: var(--border-strong); }
.compare-chip button {
  width: 18px; height: 18px; border-radius: 50%; border: 0;
  background: transparent; color: var(--ink-subtle); display: grid; place-items: center;

.compare-chip button:hover { background: var(--bg); color: var(--ink); }

/* range inputs */
.range-row { display: grid; grid-template-columns: 96px 1fr 1fr; align-items: center; gap: 8px; }
.range-row .lbl { font-size: 11.5px; color: var(--ink-subtle); }
.range-row input {
  background: var(--bg-raised); border: 1px solid var(--border);
  border-radius: 4px; padding: 4px 8px; font-size: 12px;
  font-family: var(--font-mono); width: 100%;
}
.range-row input:focus { border-color: var(--accent); outline: 0; }

/* expandable card detail */
.prov-expand {
  margin-top: 8px; padding-top: 10px;
  border-top: 1px dashed var(--border);
  display: grid; grid-template-columns: auto 1fr; gap: 4px 12px;
  font-size: 11.5px; color: var(--ink-muted);
}
.prov-expand dt { color: var(--ink-subtle); }
.prov-expand dd { margin: 0; font-family: var(--font-mono); font-size: 11px; }

.card-link {
  background: transparent; border: 0; color: var(--ink-subtle);
  font-size: 11px; padding: 2px 4px; display: inline-flex; align-items: center; gap: 4px;
  font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.04em;
}
.card-link:hover { color: var(--ink); }

/* compare table */
.compare-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.compare-table th, .compare-table td {
  padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: top;
}
.compare-table thead th {
  background: var(--bg-panel); text-align: left;
  font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.04em;
  color: var(--ink-subtle); font-weight: 500;
}
.compare-table tbody th {
  text-align: left; font-weight: 500; font-size: 12px; color: var(--ink-muted);
  background: var(--bg-panel); width: 200px;
}
.compare-table td { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
.compare-table td.name { font-family: var(--font-serif); font-size: 17px; font-weight: 600; }
.compare-table .best { color: var(--good); font-weight: 600; }

/* quick links row below hero */
.quick-links { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
@media (max-width: 900px) { .quick-links { grid-template-columns: 1fr 1fr; } }
.quick-link {
  background: var(--bg-raised); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 16px 18px 18px;
  display: flex; flex-direction: column; gap: 6px;
  cursor: pointer; text-align: left;
  transition: border-color 160ms, background 160ms, transform 160ms, box-shadow 160ms;
  position: relative; overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.quick-link::before {
  content: ""; position: absolute; inset: auto 0 0 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  transform: scaleX(0); transform-origin: center; transition: transform 220ms;
}
.quick-link:hover {
  border-color: var(--border-strong);
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}
.quick-link:hover::before { transform: scaleX(1); }
.quick-link .ql-title { font-size: 13.5px; font-weight: 600; color: var(--ink); display: flex; align-items: center; gap: 8px; }
.quick-link .ql-title .nav-icon { color: var(--accent-ink); opacity: 1; }
.quick-link .ql-sub { font-size: 12px; color: var(--ink-muted); line-height: 1.5; }

/* ------------------------------------------------------------- RESPONSIVE */
@media (max-width: 1280px) {
  .hero-panel { grid-template-columns: 220px minmax(0, 1fr); }
  .hero-panel > div:last-child {
    grid-column: 1 / -1;
    flex-direction: row !important; flex-wrap: wrap;
  }
}
@media (max-width: 900px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; border-right: 0;
    border-bottom: 1px solid var(--border); flex-direction: row; flex-wrap: wrap;
    padding: 10px 12px; gap: 6px; overflow-x: auto; }
  .sidebar .brand { border-bottom: 0; padding: 4px 8px; margin-bottom: 0; width: 100%; }
  .sidebar .nav-section { padding: 2px 4px 0; font-size: 10px; width: 100%; }
  .sidebar .sidebar-foot { margin-top: 0; border-top: 0; width: 100%; padding-top: 6px; }
  .topbar { padding: 0 12px; gap: 10px; }
  .topbar-right { gap: 8px; }
  .topbar-meta { display: none; }
  .topbar .top-controls { display: none; }
  .theme-corner {
    display: block; position: fixed; top: 10px; right: 12px; z-index: 60;
  }
  .theme-corner .theme-toggle, .theme-corner .language-toggle { box-shadow: var(--shadow-sm); }
  .theme-corner .top-controls { gap: 6px; }
  .theme-toggle button { width: 32px; padding: 5px 0; }
  .language-toggle button { min-width: 38px; padding: 5px 8px; }
  .theme-toggle .theme-label { display: none; }
  .page { padding: 20px 16px 48px; }
  .hero-panel { grid-template-columns: 1fr; }
  .struct-box { width: 100%; }
}
</style>

// ---------------------------------------------------------------- Downloads
function toCsv(rows, columns) {
  const esc = (v) => {
    if (v === null || v === undefined) return "";
    const s = String(v);
    return /[",\n]/.test(s) ? `"${s.replaceAll('"', '""')}"` : s;
  };
  return [columns.join(","), ...rows.map(r => columns.map(c => esc(r[c])).join(","))].join("\n");
}
function downloadText(filename, text, mime = "text/plain") {
  const blob = new Blob([text], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 800);
}
function copyText(s, onOk) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(s).then(()=>onOk && onOk()).catch(()=>{});
  }
}
function toBibtex(m) {
  return `@misc{rphysgendb_${m.mol_id},
  author       = {{R-PhysGen-DB contributors}},
  title        = {${m.r_name} canonical property record (${m.formula})},
  howpublished = {R-PhysGen-DB v1.5.0-draft, snapshot 2026-04-24, Record ${m.mol_id}},
  year         = {2026},
  note         = {Prototype dataset}
}`;
}

// ---------------------------------------------------------------- Formula rendering
const Formula = ({str}) => {
  if (!str) return null;
  const parts = [];
  let i = 0;
  while (i < str.length) {
    const ch = str[i];
    if (ch >= '0' && ch <= '9') {
      let n = "";
      while (i < str.length && str[i] >= '0' && str[i] <= '9') { n += str[i++]; }
      parts.push(<sub key={"s"+parts.length}>{n}</sub>);
    } else {
      parts.push(<React.Fragment key={"c"+parts.length}>{ch}</React.Fragment>);
      i++;
    }
  }
  return <span>{parts}</span>;
};

const fmt = (v, digits=3) => {
  if (v === null || v === undefined || v === "") return "—";
  if (typeof v === "string") return v;
  if (Math.abs(v) >= 1000) return v.toLocaleString(undefined, {maximumFractionDigits:0});
  return Number(v).toLocaleString(undefined, {maximumFractionDigits:digits});
};
const fmtInt = n => n == null ? "—" : Number(n).toLocaleString();

// ---------------------------------------------------------------- Unit conversions
const UNITS = {
  SI: { tempLbl: "K", pressLbl: "kPa", T: v => v, P: v => v, tDigits: 1, pDigits: 0 },
  Eng: { tempLbl: "°C", pressLbl: "MPa", T: v => v == null ? v : v - 273.15, P: v => v == null ? v : v / 1000, tDigits: 1, pDigits: 3 },
};
const convertByUnit = (value, unit, u) => {
  if (value == null || value === "" || isNaN(Number(value))) return { v: value, unit };
  const num = Number(value);
  if (unit === "K" && u === "Eng") return { v: num - 273.15, unit: "°C" };
  if (unit === "kPa" && u === "Eng") return { v: num / 1000, unit: "MPa" };
  return { v: num, unit };
};

// ---------------------------------------------------------------- Offline molecular structure views
const STRUCTURES = window.STRUCTURE_DATA || {};
const getStructure = (mol) => mol ? STRUCTURES[mol.mol_id] : null;

const atomColor = (element) => ({
  C: "var(--ink-muted)",
  H: "var(--bg-raised)",
  F: "#27b8c7",
  Cl: "#39a96b",
  O: "#e34b4b",
  N: "#4d6fe8",
}[element] || "var(--accent)");

const atomTextColor = (element) => ({
  C: "var(--bg-raised)",
  H: "var(--ink-muted)",
  F: "#052f35",
  Cl: "#062718",
  O: "#ffffff",
  N: "#ffffff",
}[element] || "var(--bg-raised)");

const atomRadius = (element) => ({
  H: 4.4,
  C: 7.2,
  N: 6.8,
  O: 6.8,
  F: 6.6,
  Cl: 8.8,
}[element] || 7);

const clamp = (n, min, max) => Math.min(max, Math.max(min, n));
const DEFAULT_STRUCTURE_ROTATION = {x: -0.55, y: 0.7};

const structureSvgForTheme = (svg) => (svg || "")
  .replaceAll("stroke:#000000", "stroke:currentColor")
  .replaceAll("fill='#000000'", "fill='currentColor'")
  .replaceAll('fill="#000000"', 'fill="currentColor"');

const rotate3d = (atom, rotation) => {
  const sx = Math.sin(rotation.x), cx = Math.cos(rotation.x);
  const sy = Math.sin(rotation.y), cy = Math.cos(rotation.y);
  const y1 = atom.y * cx - atom.z * sx;
  const z1 = atom.y * sx + atom.z * cx;
  const x2 = atom.x * cy + z1 * sy;
  const z2 = -atom.x * sy + z1 * cy;
  return {...atom, x: x2, y: y1, z: z2};
};

const MoleculeStructure2D = ({mol, compact=false}) => {
  const structure = getStructure(mol);
  if (structure?.svg2d) {
    return (
      <div
        className={"struct-mol-svg" + (compact ? " compact" : "")}
        title={structure.method || mol?.smiles || ""}
        dangerouslySetInnerHTML={{__html: structureSvgForTheme(structure.svg2d)}}
      />
    );
  }
  return <span className="struct-formula"><Formula str={mol?.formula || ""}/></span>;
};

const MoleculeStructure3D = ({mol}) => {
  const { t } = useI18n();
  const structure = getStructure(mol);
  const atoms = structure?.atoms3d || [];
  const bonds = structure?.bonds || [];
  const [rotation, setRotation] = useState(DEFAULT_STRUCTURE_ROTATION);
  const [zoom, setZoom] = useState(1);
  const drag = useRef(null);

  const projected = useMemo(() => {
    const width = 260, height = 164;
    if (!atoms.length) return {width, height, atoms: [], byIndex: {}};

    const rotated = atoms.map((atom, i) => ({...rotate3d(atom, rotation), i}));
    const xs = rotated.map(a => a.x);
    const ys = rotated.map(a => a.y);
    const minX = Math.min(...xs), maxX = Math.max(...xs);
    const minY = Math.min(...ys), maxY = Math.max(...ys);
    const spanX = Math.max(maxX - minX, 0.7);
    const spanY = Math.max(maxY - minY, 0.7);
    const scale = Math.min((width - 52) / spanX, (height - 46) / spanY) * 0.9 * zoom;
    const centerX = (minX + maxX) / 2;
    const centerY = (minY + maxY) / 2;
    const points = rotated.map(atom => ({
      ...atom,
      px: width / 2 + (atom.x - centerX) * scale,
      py: height / 2 - (atom.y - centerY) * scale,
    }));
    const byIndex = points.reduce((acc, atom) => {
      acc[atom.i] = atom;
      return acc;
    }, {});
    return {width, height, atoms: points, byIndex};
  }, [atoms, rotation, zoom]);

  if (!atoms.length) {
    return <div className="structure-empty">{t("structure.no3d")}</div>;
  }

  const startDrag = (e) => {
    e.preventDefault();
    e.currentTarget.setPointerCapture && e.currentTarget.setPointerCapture(e.pointerId);
    drag.current = {x: e.clientX, y: e.clientY, rotation};
  };
  const moveDrag = (e) => {
    if (!drag.current) return;
    const dx = e.clientX - drag.current.x;
    const dy = e.clientY - drag.current.y;
    setRotation({
      x: clamp(drag.current.rotation.x + dy * 0.012, -Math.PI, Math.PI),
      y: drag.current.rotation.y + dx * 0.012,
    });
  };
  const endDrag = () => { drag.current = null; };
  const wheelZoom = (e) => {
    setZoom(z => clamp(z * (e.deltaY < 0 ? 1.08 : 0.92), 0.65, 2.4));
  };
  const resetView = (e) => {
    e.stopPropagation();
    setRotation(DEFAULT_STRUCTURE_ROTATION);
    setZoom(1);
  };

  const bondOffsets = (order) => {
    const n = Math.max(1, Math.min(3, Math.round(Number(order) || 1)));
    return n === 3 ? [-3, 0, 3] : n === 2 ? [-2.4, 2.4] : [0];
  };
  const bondLines = bonds.map((bond, i) => {
    const a = projected.byIndex[bond.a];
    const b = projected.byIndex[bond.b];
    if (!a || !b) return null;
    return {...bond, i, a, b, z: (a.z + b.z) / 2};
  }).filter(Boolean).sort((a, b) => a.z - b.z);
  const visibleAtoms = [...projected.atoms].sort((a, b) => a.z - b.z);

  return (
    <div className="structure-3d" title={structure?.method || mol?.smiles || ""}>
      <svg
        viewBox={`0 0 ${projected.width} ${projected.height}`}
        role="img"
        aria-label={`${mol?.r_name || mol?.mol_id || "Molecule"} 3D structure`}
        onPointerDown={startDrag}
        onPointerMove={moveDrag}
        onPointerUp={endDrag}
        onPointerCancel={endDrag}
        onWheel={wheelZoom}
      >
        <title>{mol?.r_name || mol?.mol_id} 3D molecular structure</title>
        {bondLines.map(bond => {
          const dx = bond.b.px - bond.a.px;
          const dy = bond.b.py - bond.a.py;
          const len = Math.max(Math.hypot(dx, dy), 1);
          const nx = -dy / len;
          const ny = dx / len;
          return bondOffsets(bond.order).map(offset => (
            <line
              key={`bond-${bond.i}-${offset}`}
              x1={bond.a.px + nx * offset}
              y1={bond.a.py + ny * offset}
              x2={bond.b.px + nx * offset}
              y2={bond.b.py + ny * offset}
              stroke="var(--ink-muted)"
              strokeWidth={3.2}
              strokeLinecap="round"
              opacity={0.5 + clamp((bond.z + 2.5) / 8, 0, 0.35)}
            />
          ));
        })}
        {visibleAtoms.map(atom => {
          const r = atomRadius(atom.element) * (0.86 + clamp((atom.z + 3) / 12, 0, 0.25));
          const showLabel = atom.element !== "C" && atom.element !== "H";
          return (
            <g key={`atom-${atom.i}`}>
              <circle
                cx={atom.px}
                cy={atom.py}
                r={r}
                fill={atomColor(atom.element)}
                stroke="var(--bg-raised)"
                strokeWidth="1.4"
              />
              {showLabel && (
                <text
                  x={atom.px}
                  y={atom.py + 3.2}
                  textAnchor="middle"
                  fontFamily="var(--font-mono)"
                  fontSize="8.5"
                  fontWeight="600"
                  fill={atomTextColor(atom.element)}
                >
                  {atom.element}
                </text>
              )}
            </g>
          );
        })}
      </svg>
      <button className="structure-reset" onClick={resetView}>{t("structure.reset")}</button>
    </div>
  );
};

const MoleculeStructureViewer = ({mol}) => {

  return (
    <>

const { mols: allMols, canonical, observations, regulatory, properties } = window.DB;

const MoleculeBrowser = ({setPage, setSelectedMol, query, compare, toggleCompare, units, setUnits}) => {
  const { t } = useI18n();
  const [tier, setTier] = useState("all");
  const [family, setFamily] = useState("all");
  const [inclusion, setInclusion] = useState("all");
  const [sort, setSort] = useState("r_name");
  const [gwpMax, setGwpMax] = useState("");
  const [odpMax, setOdpMax] = useState("");
  const [nbpMin, setNbpMin] = useState("");
  const [nbpMax, setNbpMax] = useState("");
  const [safety, setSafety] = useState("all");
  const U = UNITS[units];

  const families = useMemo(()=>Array.from(new Set(allMols.map(m=>m.family))).sort(), []);

  const rows = useMemo(()=>{
    let rs = allMols;
    if (tier !== "all") rs = rs.filter(m=>m.tier===tier);
    if (family !== "all") rs = rs.filter(m=>m.family===family);
    if (inclusion !== "all") rs = rs.filter(m=>m.model_inclusion===inclusion);
    if (safety !== "all") rs = rs.filter(m=>m.ashrae===safety);
    if (gwpMax !== "" && !isNaN(+gwpMax)) rs = rs.filter(m=>m.gwp!=null && m.gwp <= +gwpMax);
    if (odpMax !== "" && !isNaN(+odpMax)) rs = rs.filter(m=>m.odp!=null && m.odp <= +odpMax);
    if (nbpMin !== "" && !isNaN(+nbpMin)) rs = rs.filter(m=>m.nbp!=null && m.nbp >= +nbpMin);
    if (nbpMax !== "" && !isNaN(+nbpMax)) rs = rs.filter(m=>m.nbp!=null && m.nbp <= +nbpMax);
    if (query && query.trim()) {
      const q = query.trim().toLowerCase();
      rs = rs.filter(m=>
        m.mol_id.toLowerCase().includes(q) ||
        (m.r_name||"").toLowerCase().includes(q) ||
        (m.formula||"").toLowerCase().includes(q) ||
        (m.cas||"").toLowerCase().includes(q) ||
        (m.inchikey||"").toLowerCase().includes(q) ||
        (m.family||"").toLowerCase().includes(q)
      );
    }
    const dir = sort.startsWith("-") ? -1 : 1;
    const key = sort.replace(/^-/, "");
    rs = [...rs].sort((a,b)=>{
      const av = a[key], bv = b[key];
      if (av==null && bv==null) return 0;
      if (av==null) return 1;
      if (bv==null) return -1;
      return av > bv ? dir : av < bv ? -dir : 0;
    });
    return rs;
  }, [tier, family, inclusion, sort, query, gwpMax, odpMax, nbpMin, nbpMax, safety]);

  return (
    <div className="page">
      <div className="page-head">
        <div className="page-eyebrow">silver · molecule_core.parquet</div>
        <h1 className="page-title">{t("molecules.title")}</h1>
        <p className="page-sub">{t("molecules.subtitle", {total: fmtInt(5598), subset: fmtInt(120)})}</p>
      </div>

      <div className="card">
        <div className="filterbar">
          <span className="filter-label">{t("molecules.tier")}</span>
          <div className="chip-group">
            {["all","A","B","C","D"].map(tv=>(
              <button key={tv} className={"chip "+(tier===tv?"active":"")} onClick={()=>setTier(tv)}>
                {tv==="all"?t("common.all"):tv}
              </button>
            ))}
          </div>
          <span className="filter-label" style={{marginLeft:8}}>{t("common.model")}</span>
          <div className="chip-group">
            {["all","yes","no"].map(v=>(
              <button key={v} className={"chip "+(inclusion===v?"active":"")} onClick={()=>setInclusion(v)}>
                {v==="all"?t("common.all"):(v==="yes"?t("common.included"):t("common.excluded"))}
              </button>
            ))}
          </div>
          <span className="filter-label" style={{marginLeft:8}}>{t("common.family")}</span>
          <select className="select" value={family} onChange={e=>setFamily(e.target.value)}>
            <option value="all">{t("molecules.allFamilies")}</option>
            {families.map(f=><option key={f} value={f}>{f}</option>)}
          </select>
          <div style={{marginLeft:"auto", display:"flex", alignItems:"center", gap:8}}>
            <UnitToggle units={units} setUnits={setUnits}/>
            <span className="mono subtle" style={{fontSize:11.5}} title={t("molecules.countTitle")}>
              {fmtInt(rows.length)} {t("common.of")} {fmtInt(allMols.length)}
            </span>
            <button className="btn sm ghost" onClick={()=>{
              downloadText("r-physgen-molecules.csv",
                toCsv(rows, ["mol_id","r_name","formula","cas","inchikey","family","tier","mw","nbp","tcrit","pcrit","gwp","odp","ashrae","tox"]),
                "text/csv");
            }}><Icon name="download" size={12}/> CSV</button>
            <button className="btn sm ghost" onClick={()=>{
              downloadText("r-physgen-molecules.json", JSON.stringify(rows, null, 2), "application/json");
            }}><Icon name="download" size={12}/> JSON</button>
          </div>
        </div>

        {/* Range filter row */}
        <div className="filterbar" style={{borderTop:"1px dashed var(--border)", borderRadius:0, gap:14}}>
          <span className="filter-label">{t("common.ranges")}</span>
          <div style={{display:"grid", gridTemplateColumns:"repeat(3, minmax(180px, 1fr))", gap:12, flex:1}}>
            <div className="range-row"><span className="lbl">{t("molecules.gwpMax")}</span>
              <input type="number" placeholder="e.g. 150" value={gwpMax} onChange={e=>setGwpMax(e.target.value)}/>
              <span/>
            </div>
            <div className="range-row"><span className="lbl">{t("molecules.odpMax")}</span>
              <input type="number" step="0.001" placeholder="e.g. 0" value={odpMax} onChange={e=>setOdpMax(e.target.value)}/>
              <span/>
            </div>
            <div className="range-row"><span className="lbl">{t("molecules.nbp")}</span>
              <input type="number" placeholder="min" value={nbpMin} onChange={e=>setNbpMin(e.target.value)}/>
              <input type="number" placeholder="max" value={nbpMax} onChange={e=>setNbpMax(e.target.value)}/>
            </div>
          </div>
          <span className="filter-label">{t("common.safety")}</span>
          <select className="select" value={safety} onChange={e=>setSafety(e.target.value)}>
            <option value="all">{t("common.any")}</option>
            {["A1","A2L","A2","A3","B1","B2L","B2","B3"].map(s=><option key={s} value={s}>{s}</option>)}
          </select>
          <button className="btn sm ghost" onClick={()=>{
            setTier("all"); setFamily("all"); setInclusion("all"); setSafety("all");
            setGwpMax(""); setOdpMax(""); setNbpMin(""); setNbpMax("");
          }}>{t("common.reset")}</button>
        </div>

        <div style={{maxHeight:"calc(100vh - 280px)", overflowY:"auto"}}>
          <table className="data-table">
            <thead>
              <tr>
                <th style={{width:30}}></th>
                <th style={{width:92}}>{t("common.structure")}</th>
                <SortHead label="ID"       k="mol_id"   sort={sort} setSort={setSort}/>
                <SortHead label={t("common.name")}     k="r_name"   sort={sort} setSort={setSort}/>
                <th>{t("common.formula")}</th>
                <SortHead label="MW"       k="mw"       sort={sort} setSort={setSort} align="right"/>
                <th>{t("common.family")}</th>
                <th>{t("common.tier")}</th>
                <SortHead label={`NBP / ${U.tempLbl}`}  k="nbp"      sort={sort} setSort={setSort} align="right"/>
                <SortHead label={`Tc / ${U.tempLbl}`}   k="tcrit"    sort={sort} setSort={setSort} align="right"/>
                <SortHead label={`Pc / ${U.pressLbl}`}  k="pcrit"    sort={sort} setSort={setSort} align="right"/>
                <SortHead label="GWP"      k="gwp"      sort={sort} setSort={setSort} align="right"/>
                <SortHead label="ODP"      k="odp"      sort={sort} setSort={setSort} align="right"/>
                <th>ASHRAE</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {rows.map(m=>{
                const inCmp = compare && compare.includes(m.mol_id);
                return (
                <tr key={m.mol_id} className={inCmp?"selected":""} onClick={()=>setSelectedMol(m.mol_id)}>
                  <td onClick={e=>e.stopPropagation()} style={{width:30}}>
                    <input type="checkbox" checked={!!inCmp} onChange={()=>toggleCompare(m.mol_id)} aria-label={t("molecules.addCompareAria", {name: m.r_name})}/>
                  </td>
                  <td><MoleculeStructureThumb mol={m}/></td>
                  <td className="col-id">{m.mol_id}</td>
                  <td className="col-name" style={{fontFamily:"var(--font-serif)"}}>{m.r_name}</td>
                  <td className="mono" style={{fontSize:12.5}}><Formula str={m.formula}/></td>
                  <td className="col-num">{fmt(m.mw,2)}</td>
                  <td><span className="mono subtle" style={{fontSize:11.5}}>{m.family}</span></td>
                  <td><TierPill tier={m.tier}/></td>
                  <td className="col-num">{m.nbp==null?"—":fmt(U.T(m.nbp),U.tDigits)}</td>
                  <td className="col-num">{m.tcrit==null?"—":fmt(U.T(m.tcrit),U.tDigits)}</td>
                  <td className="col-num">{m.pcrit==null?"—":fmt(U.P(m.pcrit),U.pDigits)}</td>
                  <td className="col-num">{fmt(m.gwp,0)}</td>
                  <td className="col-num">{m.odp==null?"—":fmt(m.odp,3)}</td>
                  <td><SafetyPill cls={m.ashrae}/></td>
                  <td><Icon name="chevron" size={14}/></td>
                </tr>
                );
              })}
              {rows.length===0 && (
                <tr><td colSpan="15" className="empty">{t("molecules.noMatch")}</td></tr>
              )}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
};

const SortHead = ({label, k, sort, setSort, align}) => {
  const active = sort===k || sort==="-"+k;
  const desc = sort==="-"+k;
  return (
    <th style={{cursor:"pointer", textAlign:align||"left"}}
        onClick={()=>setSort(active && !desc ? "-"+k : k)}
        aria-sort={active ? (desc ? "descending" : "ascending") : "none"}>
      <span style={{display:"inline-flex", alignItems:"center", gap:4, opacity: active?1:0.8}}>
        {label}
        {active && <span style={{fontSize:9, color:"var(--accent)"}}>{desc?"▼":"▲"}</span>}
      </span>
    </th>
  );
};

const ComparePage = ({ids, setPage, setSelectedMol, toggleCompare, units, setUnits}) => {
  const { t } = useI18n();
  const picked = ids.map(id => _cmpMols.find(m=>m.mol_id===id)).filter(Boolean);

  if (picked.length < 1) {
    return (
      <div className="page">
        <div className="page-head">
          <div className="page-eyebrow">compare</div>
          <h1 className="page-title">{t("compare.title")}</h1>
          <p className="page-sub">{t("compare.emptySub")}</p>
        </div>
        <div className="card"><div className="card-body" style={{padding:32}}>
          <div className="empty">
            <div className="icon">⇌</div>
            {t("compare.empty")}
            <div style={{marginTop:14}}>
              <button className="btn primary" onClick={()=>setPage("molecules")}>{t("compare.openBrowser")}</button>
            </div>
          </div>
        </div></div>
      </div>
    );
  }

  const U = UNITS[units];
  const getCanon = (mol_id, key) => _cmpCanon.find(c => c.mol_id===mol_id && c.canonical_feature_key===key);

  const rows = [
    {group:t("compare.identity"), items:[
      {label:t("compare.refrigerant"), val: m => <span className="name">{m.r_name}</span>, raw: m => m.r_name},
      {label:t("common.formula"), val: m => <Formula str={m.formula}/>, raw: m => m.formula},
      {label:t("common.family"), val: m => m.family, raw: m => m.family},
      {label:"CAS", val: m => m.cas, raw: m => m.cas},
      {label:t("common.tier"), val: m => <TierPill tier={m.tier}/>, raw: m => m.tier},
    ]},
    {group:t("compare.environmental"), items:[
      {label:"GWP (100yr)", raw: m => m.gwp, val: m => fmt(m.gwp,0), better:"min"},
      {label:"ODP", raw: m => m.odp, val: m => m.odp==null?"—":fmt(m.odp,4), better:"min"},
      {label:t("compare.atmLifetime"), raw: m => { const c = getCanon(m.mol_id,"environmental.atmospheric_lifetime"); return c?Number(c.value):null; },
       val: m => { const c = getCanon(m.mol_id,"environmental.atmospheric_lifetime"); return c?fmt(Number(c.value),2)+" yr":"—"; }, better:"min"},
    ]},
    {group:t("compare.thermodynamic"), items:[
      {label:`NBP / ${U.tempLbl}`, raw: m => m.nbp, val: m => m.nbp==null?"—":fmt(U.T(m.nbp),U.tDigits)},
      {label:`T_crit / ${U.tempLbl}`, raw: m => m.tcrit, val: m => m.tcrit==null?"—":fmt(U.T(m.tcrit),U.tDigits)},
      {label:`P_crit / ${U.pressLbl}`, raw: m => m.pcrit, val: m => m.pcrit==null?"—":fmt(U.P(m.pcrit),U.pDigits)},
      {label:"MW / g·mol⁻¹", raw: m => m.mw, val: m => m.mw==null?"—":fmt(m.mw,2)},
    ]},
    {group:t("compare.cyclePerf"), items:[
      {label:"COP (std cycle)", raw: m => { const c = getCanon(m.mol_id,"cycle.cop_standard"); return c?Number(c.value):null; },
       val: m => { const c = getCanon(m.mol_id,"cycle.cop_standard"); return c?fmt(Number(c.value),2):"—"; }, better:"max"},
      {label:"Vol. capacity / kJ·m⁻³", raw: m => { const c = getCanon(m.mol_id,"cycle.volumetric_capacity_kj_m3"); return c?Number(c.value):null; },
       val: m => { const c = getCanon(m.mol_id,"cycle.volumetric_capacity_kj_m3"); return c?fmt(Number(c.value),0):"—"; }, better:"max"},
    ]},
    {group:t("common.safety"), items:[
      {label:t("compare.ashraeClass"), raw: m => m.ashrae, val: m => <SafetyPill cls={m.ashrae}/>},
      {label:t("common.toxicity"), raw: m => m.tox, val: m => m.tox||"—"},
    ]},
  ];

  // mark "best" per row for numeric comparisons
  const bestIdx = (raws, dir) => {
    const nums = raws.map(r => typeof r === "number" ? r : null);
    const defined = nums.filter(n => n != null);
    if (defined.length < 2) return -1;
    const target = dir === "min" ? Math.min(...defined) : Math.max(...defined);
    return nums.findIndex(n => n === target);
  };

  return (
    <div className="page">
      <div className="page-head">
        <div style={{display:"flex", alignItems:"flex-start", gap:16, flexWrap:"wrap"}}>
          <div style={{flex:1, minWidth:0}}>
            <div className="page-eyebrow">{t("compare.pageEyebrow")} · {picked.length} {t("common.of")} 6</div>
            <h1 className="page-title">{t("compare.sideTitle")}</h1>
            <p className="page-sub">{t("compare.sideSub")}</p>
          </div>
          <div style={{display:"flex", gap:8, alignItems:"center"}}>
            <UnitToggle units={units} setUnits={setUnits}/>
            <button className="btn sm" onClick={()=>{
              const flat = picked.map(m => ({mol_id:m.mol_id, r_name:m.r_name, family:m.family, formula:m.formula,
                mw:m.mw, nbp:m.nbp, tcrit:m.tcrit, pcrit:m.pcrit, gwp:m.gwp, odp:m.odp, ashrae:m.ashrae}));
              downloadText("r-physgen-compare.csv", toCsv(flat, Object.keys(flat[0])), "text/csv");
            }}><Icon name="download" size={12}/> CSV</button>
          </div>
        </div>
      </div>

      <div className="card" style={{padding:0, overflowX:"auto"}}>
        <table className="compare-table">
          <thead>
            <tr>
              <th></th>
              {picked.map(m => (
                <th key={m.mol_id}>
                  <div style={{display:"flex", alignItems:"center", gap:6}}>
                    <a onClick={()=>setSelectedMol(m.mol_id)} style={{cursor:"pointer", fontFamily:"var(--font-serif)", fontSize:14, fontWeight:600, color:"var(--ink)"}}>{m.r_name}</a>
                    <button className="btn sm ghost" onClick={()=>toggleCompare(m.mol_id)} aria-label="Remove" style={{padding:"2px 6px"}}>×</button>
                  </div>
                  <div className="mono subtle" style={{fontSize:11, textTransform:"none", letterSpacing:0, marginTop:2}}>{m.mol_id}</div>
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {rows.map(section => (
              <React.Fragment key={section.group}>
                <tr>
                  <th colSpan={picked.length + 1} style={{background:"var(--bg-sunken)", color:"var(--ink-muted)", fontSize:11, textTransform:"uppercase", letterSpacing:"0.06em", padding:"8px 14px"}}>
                    {section.group}
                  </th>
                </tr>
                {section.items.map(item => {
                  const raws = picked.map(m => item.raw ? item.raw(m) : null);
                  const bi = item.better ? bestIdx(raws, item.better) : -1;
                  return (
                    <tr key={item.label}>
                      <th>{item.label}</th>
                      {picked.map((m,i) => (
                        <td key={m.mol_id} className={bi===i?"best":""}>
                          {item.val(m)}
                        </td>
                      ))}
                    </tr>
                  );
                })}
              </React.Fragment>
            ))}
          </tbody>
        </table>
      </div>

      <div style={{marginTop:16, display:"flex", gap:8}}>
        <button className="btn ghost" onClick={()=>setPage("molecules")}>← {t("common.backToBrowser")}</button>
      </div>
    </div>
  );
};

// ============================================================ APP ROOT
const { useState: _useState, useEffect: _useEffect } = React;

function App() {
  const [theme, setThemeState] = _useState(() => localStorage.getItem("rpg-theme") || "light");
  const [lang, setLangState] = _useState(() => localStorage.getItem("rpg-lang") || "zh");

  // Hash routing: #/<page>/<molId?>
  const parseHash = () => {
    const h = (window.location.hash || "").replace(/^#\/?/, "");
    const [p, id] = h.split("/");
    return { page: p || "dashboard", molId: id || null };
  };
  const [route, setRoute] = _useState(parseHash);

  _useEffect(() => {
    const onHash = () => setRoute(parseHash());
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);

  const setPage = (p) => {
    const currentRoute = parseHash();
    const molId = p === "molecule" ? (currentRoute.molId || route.molId) : null;
    const h = "#/" + p + (p === "molecule" && molId ? "/" + molId : "");
    if (window.location.hash !== h) window.location.hash = h;
    else setRoute({ page: p, molId });
  };
  const setSelectedMol = (id) => {
    const h = "#/molecule/" + id;
    if (window.location.hash !== h) window.location.hash = h;
    else setRoute({ page: "molecule", molId: id });
  };

  const page = route.page;
  const selectedMol = route.molId || "MOL_R32";

  const [query, setQuery] = _useState("");
  const [compare, setCompare] = _useState(() => {
    try { return JSON.parse(localStorage.getItem("rpg-compare") || "[]"); } catch { return []; }
  });
  const [units, setUnits] = _useState(() => localStorage.getItem("rpg-units") || "SI");
  _useEffect(() => { localStorage.setItem("rpg-compare", JSON.stringify(compare)); }, [compare]);
  _useEffect(() => { localStorage.setItem("rpg-units", units); }, [units]);
  const toggleCompare = (id) => setCompare(c => c.includes(id) ? c.filter(x=>x!==id) : c.length>=6 ? c : [...c, id]);
  const clearCompare = () => setCompare([]);

  const setTheme = (t) => { setThemeState(t); localStorage.setItem("rpg-theme", t); };
  const setLang = (l) => { setLangState(l); localStorage.setItem("rpg-lang", l); };
  const i18nValue = React.useMemo(() => {
    const dict = I18N[lang] || I18N.zh;
    return {
      lang,
      t: (key, vars) => interpolate(dict[key] ?? I18N_EN[key] ?? key, vars),
    };
  }, [lang]);

  _useEffect(() => {
    document.documentElement.dataset.theme = theme;
  }, [theme]);

  _useEffect(() => {
    document.documentElement.lang = lang === "zh" ? "zh-Hans" : "en";
  }, [lang]);

  _useEffect(() => {
    if (query && query.trim() && !["molecules","molecule"].includes(page)) {
      setPage("molecules");
    }
  }, [query]);

  return (
    <I18nContext.Provider value={i18nValue}>
    <div className="app">
      <Sidebar page={page} setPage={setPage}/>
      <div className="theme-corner">
        <TopControls theme={theme} setTheme={setTheme} lang={lang} setLang={setLang}/>
      </div>
      <div className="main">
        <Topbar query={query} onQuery={setQuery} theme={theme} setTheme={setTheme} lang={lang} setLang={setLang}/>
        {page === "dashboard"  && <Dashboard setPage={setPage} setSelectedMol={setSelectedMol} setQuery={setQuery}/>}
        {page === "molecules"  && <MoleculeBrowser setPage={setPage} setSelectedMol={setSelectedMol} query={query} compare={compare} toggleCompare={toggleCompare} units={units} setUnits={setUnits}/>}
        {page === "molecule"   && <MoleculeDetail molId={selectedMol} setPage={setPage} units={units} setUnits={setUnits} compare={compare} toggleCompare={toggleCompare}/>}
        {page === "compare"    && <ComparePage ids={compare} setPage={setPage} setSelectedMol={setSelectedMol} toggleCompare={toggleCompare} units={units} setUnits={setUnits}/>}
        {page === "mixtures"   && <MixturesPage setPage={setPage} setSelectedMol={setSelectedMol}/>}
        {page === "properties" && <PropertiesPage/>}
        {page === "canonical"  && <CanonicalPage setPage={setPage} setSelectedMol={setSelectedMol}/>}
        {page === "review"     && <ReviewPage setPage={setPage} setSelectedMol={setSelectedMol}/>}
        {page === "regulatory" && <RegulatoryPage setPage={setPage} setSelectedMol={setSelectedMol}/>}
        {page === "cycle"      && <CyclePage/>}
        {page === "al"         && <ActiveLearningPage/>}
        {page === "sources"    && <SourcesPage/>}
      </div>
      {compare.length > 0 && page !== "compare" && (
        <CompareDrawer ids={compare} toggleCompare={toggleCompare} clearCompare={clearCompare} goCompare={()=>setPage("compare")}/>
      )}
    </div>
    </I18nContext.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
